<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ivana</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <img src="slike/meda.png" class="bear" alt="Meda">

    <h1>Ivana</h1>

    <p class="text">
        Da li bi večeras izašla sa mnom na kafu? ☕
    </p>

    <div class="buttons">

        <button id="yesBtn">
            NARAVNO ❤️
        </button>

        <button id="noBtn">
            NE 😢
        </button>

    </div>

   <div id="bubble"></div>
<p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-4px);}
    50%{transform:translateX(4px);}
    75%{transform:translateX(-4px);}
    100%{transform:translateX(0);}
}
